services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tang
      POSTGRES_PASSWORD: tang
      POSTGRES_DB: tang
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tang -d tang']
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '8080:80'

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    ports:
      - '8081:80'

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    environment:
      PORT: 3002
      HOST: 0.0.0.0
      PERSISTENCE_MODE: pg
      DATABASE_URL: postgresql://tang:tang@postgres:5432/tang
      DB_CONNECT_RETRIES: 20
      DB_CONNECT_DELAY_MS: 1500
      JWT_SECRET: change-me
      AI_CONFIG_SECRET: change-me
      ADMIN_EMAILS: admin@example.com
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3002:3002'

volumes:
  postgres-data:
