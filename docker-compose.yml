services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tang
      POSTGRES_PASSWORD: tang
      POSTGRES_DB: tang
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '8080:80'

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    ports:
      - '8081:80'

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    environment:
      PORT: 3002
      HOST: 0.0.0.0
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: tang
      DB_PASSWORD: tang
      DB_NAME: tang
      JWT_SECRET: change-me
      AI_CONFIG_SECRET: change-me
      ADMIN_EMAILS: admin@example.com
    depends_on:
      - postgres
    ports:
      - '3002:3002'

volumes:
  postgres-data:
